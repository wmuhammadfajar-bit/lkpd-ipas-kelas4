:root{

  --sky:#5bc4e8;--sky-pale:#dff4fc;
  --sun:#f9c846;--sun-pale:#fff8dc;
  --earth:#c97b3a;--earth-pale:#fdf0e0;
  --coral:#f26b6b;--coral-pale:#fde8e8;
  --white:#ffffff;--offwhite:#f4fdf7;
  --gray1:#e8f5ee;--gray2:#c8e6d4;--gray3:#6aaa82;--gray4:#1f4d30;--dark:#0f2d1a;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Poppins',sans-serif;background:var(--offwhite);}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:#c8e6d4;}
::-webkit-scrollbar-thumb{background:var(--green-light);border-radius:10px;}
textarea,input,select{font-family:'Poppins',sans-serif;}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes sway{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes bounce{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
@keyframes shimmer{0%{background-position:200% center;}100%{background-position:-200% center;}}
@keyframes leaf-fall{0%{transform:rotate(-10deg) translateY(0);opacity:1;}100%{transform:rotate(20deg) translateY(30px);opacity:0;}}

.fade-up{animation:fadeUp .4s ease both;}
.fade-in{animation:fadeIn .35s ease both;}
.a1{animation-delay:.06s}.a2{animation-delay:.12s}.a3{animation-delay:.18s}.a4{animation-delay:.24s}.a5{animation-delay:.30s}.a6{animation-delay:.36s}
.float{animation:float 3s ease-in-out infinite;}
.sway{animation:sway 2.5s ease-in-out infinite;}
.bounce-anim{animation:bounce 1.8s ease-in-out infinite;}
.hover-lift{transition:transform .2s,box-shadow .2s;}
.hover-lift:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(45,138,82,.18)!important;}
.btn-press{cursor:pointer;transition:transform .15s;}
.btn-press:active{transform:scale(.94);}

/* Leaf decorations */
.leaf{position:absolute;pointer-events:none;opacity:.18;}
.leaf svg{fill:var(--green-light);}

/* Nature card style */
.nature-card{
  background:var(--white);
  border-radius:20px;
  border:2.5px solid #c8e6d4;
  box-shadow:0 4px 20px rgba(45,138,82,.1);
}
.nature-card:hover{border-color:var(--green-light);}

/* Scrollbar styling for content areas */
#content-scroll::-webkit-scrollbar{width:5px;}
#content-scroll::-webkit-scrollbar-thumb{background:var(--green-light);border-radius:10px;}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,.45);}
input:focus,textarea:focus{box-shadow:0 0 0 3px rgba(249,200,70,.25);}
</style>
</head>

  return `<div style="width:${size}px;height:${size*0.6}px;flex-shrink:0;${style}">${svgs[type]||SVG.caterpillar}</div>`;

const LS_KEY = 'ipas_lkpd_alam_v1';
function lsSave(){try{localStorage.setItem(LS_KEY,JSON.stringify({lkpdAnswers:state.lkpdAnswers,readSet:Array.from(state.readSet),matchingSel:state.matchingSel,matchingChecked:state.matchingChecked,evalChecked:state.evalChecked}));}catch(e){}}
function lsLoad(){try{const raw=localStorage.getItem(LS_KEY);if(!raw)return;const d=JSON.parse(raw);if(d.lkpdAnswers)state.lkpdAnswers=d.lkpdAnswers;if(d.readSet)state.readSet=new Set(d.readSet);if(d.matchingSel)state.matchingSel=d.matchingSel;if(d.matchingChecked)state.matchingChecked=d.matchingChecked;if(d.evalChecked)state.evalChecked=d.evalChecked;}catch(e){}}
function showDeleteConfirm(){const el=document.getElementById('delete-confirm');if(el)el.style.display='block';}
function hideDeleteConfirm(){const el=document.getElementById('delete-confirm');if(el)el.style.display='none';}
function lsClear(){try{localStorage.removeItem(LS_KEY);}catch(e){}state.lkpdAnswers={};state.readSet=new Set();state.matchingSel={};state.matchingChecked={};state.evalChecked={};state.accordionOpen={'ch2p1':0,'ch3p1':0};state.tabActive={'ch5p2':0};goTo('home');}

function goTo(name,params={}){state.page=name;state.params=params;render();window.scrollTo(0,0);setTimeout(()=>{const sc=document.getElementById('content-scroll');if(sc)sc.scrollTop=0;},0);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getAns(id){return state.lkpdAnswers[id]||{};}

function progressRing(pct,color,size=56){
  const r=20,c=2*Math.PI*r,dash=c*pct/100;
  return `<svg width="${size}" height="${size}" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="${r}" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="4"/>
    <circle cx="24" cy="24" r="${r}" fill="none" stroke="${color}" stroke-width="4"
      stroke-dasharray="${dash} ${c}" stroke-linecap="round" transform="rotate(-90 24 24)"/>
    <text x="24" y="28" text-anchor="middle" font-size="10" font-weight="700" fill="${color}" font-family="Poppins,sans-serif">${pct}%</text>
  </svg>`;
}

        style="background:${act.color};color:#fff;border:none;border-radius:16px;padding:14px 30px;cursor:pointer;font-weight:800;font-size:15px;font-family:'Poppins',sans-serif;margin-bottom:16px;box-shadow:0 5px 18px ${act.color}50">
        Cek Jawaban ✓
      </button>
      ${checked?`
        <div style="background:${score>=7?'#c8f0d8':score>=5?'#fff3cc':'#ffd6d6'};border-radius:18px;padding:18px 22px;margin-bottom:22px;display:flex;gap:16px;align-items:center;border:2.5px solid ${score>=7?'#2d8a52':score>=5?'#c97a00':'#c93030'}50">
          ${progressRing(Math.round(score/act.statements.length*100),score>=7?'#2d8a52':score>=5?'#c97a00':'#c93030')}
          <div>
            <div style="font-weight:800;font-size:17px;color:#0f2d1a;font-family:'Poppins',sans-serif">Skor: ${score}/${act.statements.length}</div>
            <div style="font-size:14px;color:#1f4d30;margin-top:4px;font-weight:700">${score>=7?'🎉 Luar biasa! Kamu sangat hebat!':score>=5?'👍 Bagus! Terus semangat belajar!':'💪 Yuk baca lagi materinya, kamu pasti bisa!'}</div>
          </div>
        </div>`:''}
      <div style="font-weight:800;color:#0f2d1a;margin-bottom:14px;font-size:16px;font-family:'Poppins',sans-serif">🌻 B. Refleksi Diri</div>
      <div style="background:linear-gradient(135deg,#fff3cc,#fde8c0);border-radius:20px;padding:20px;border:2.5px solid #c97a0040">
        ${act.reflections.map(r=>`
          <div style="margin-bottom:16px">
            <div style="font-weight:800;color:#0f2d1a;font-size:14.5px;margin-bottom:9px;font-family:'Poppins',sans-serif">💭 ${r.q}</div>
            <textarea rows="3" placeholder="✍️ Tuliskan refleksimu..."
              oninput="saveAns('${act.id}','${r.id}',this.value)"
              onfocus="this.style.borderColor='#c97a00'"
              onblur="this.style.borderColor='#c97a0050'"
              style="width:100%;border:2.5px solid #c97a0050;border-radius:14px;padding:12px 14px;font-size:14.5px;resize:vertical;outline:none;background:#fff;line-height:1.75;box-sizing:border-box;color:#0f2d1a;font-family:'Poppins',sans-serif;font-weight:700">${esc(ans[r.id]||'')}</textarea>
          </div>`).join('')}
      </div>
    </div>`;
}

function renderLkpdActivity(act){
  if(act.type==='essay') return renderLkpdEssay(act);
  if(act.type==='table-fill') return renderLkpdTableFill(act);
  if(act.type==='rules-matching') return renderLkpdRulesMatching(act);
  if(act.type==='scenario') return renderLkpdScenario(act);
  if(act.type==='evaluation') return renderLkpdEvaluation(act);
  return '';
}

function renderChapter(){

  const isLast=pageIdx===totalPages-1;
  if(isLast){state.readSet.add(chIdx);lsSave();}
  const pct=Math.round(((chIdx*2+pageIdx+1)/(CHAPTERS.length*2))*100);
  const nextBg=isLast&&chIdx===CHAPTERS.length-1?'linear-gradient(135deg,#2d8a52,#1a5c35)':ch.color;
  const nextLabel=isLast?(chIdx<CHAPTERS.length-1?`Sub Bab ${chIdx+2}: ${CHAPTERS[chIdx+1].icon} →`:'Kerjakan LKPD ✏️'):'Lanjut →';

// ── RENDER ──
function render(){
  const app=document.getElementById('app');
  let html='';
  if(state.page==='home') html=renderHome();
  else if(state.page==='cover') html=renderCover();
  else if(state.page==='chapter') html=renderChapter();
  else if(state.page==='lkpd-home') html=renderLkpdHome();
  else if(state.page==='lkpd-activity') html=renderLkpdActivityPage();
  else if(state.page==='finish') html=renderFinish();
  else html=renderHome();
  app.innerHTML=html;
  populateTopbarName();
}

// ── EVENT HANDLERS ──
function toggleAccordion(bid,idx,scrollId){
  state.accordionOpen[bid]=state.accordionOpen[bid]===idx?-1:idx;
  const sc=scrollId?document.getElementById(scrollId):null;
  const top=sc?sc.scrollTop:0;
  render();
  setTimeout(()=>{const sc2=scrollId?document.getElementById(scrollId):null;if(sc2)sc2.scrollTop=top;},0);
}
function setTabActive(bid,idx,scrollId){
  state.tabActive[bid]=idx;
  const sc=scrollId?document.getElementById(scrollId):null;
  const top=sc?sc.scrollTop:0;
  render();
  setTimeout(()=>{const sc2=scrollId?document.getElementById(scrollId):null;if(sc2)sc2.scrollTop=top;},0);
}
function saveAns(actId,key,val){
  if(!state.lkpdAnswers[actId])state.lkpdAnswers[actId]={};
  state.lkpdAnswers[actId][key]=val;
  lsSave();
}
function setMatchingSel(actId,idx,letter){
  if(!state.matchingSel[actId])state.matchingSel[actId]={};
  state.matchingSel[actId][idx]=letter;
  state.matchingChecked[actId]=false;
  if(!state.lkpdAnswers[actId])state.lkpdAnswers[actId]={};
  state.lkpdAnswers[actId]['__matching']={...state.matchingSel[actId]};
  lsSave();
  const sc=document.getElementById('content-scroll');
  const top=sc?sc.scrollTop:0;
  render();
  setTimeout(()=>{const sc2=document.getElementById('content-scroll');if(sc2)sc2.scrollTop=top;},0);
}
function checkMatching(actId){
  state.matchingChecked[actId]=true;
  lsSave();
  const sc=document.getElementById('content-scroll');
  const top=sc?sc.scrollTop:0;
  render();
  setTimeout(()=>{const sc2=document.getElementById('content-scroll');if(sc2)sc2.scrollTop=top;},0);
}
function setEvalAns(actId,stmtId,val){
  if(!state.lkpdAnswers[actId])state.lkpdAnswers[actId]={};
  state.lkpdAnswers[actId][stmtId]=val;
  state.evalChecked[actId]=false;
  lsSave();
  const sc=document.getElementById('content-scroll');
  const top=sc?sc.scrollTop:0;
  render();
  setTimeout(()=>{const sc2=document.getElementById('content-scroll');if(sc2)sc2.scrollTop=top;},0);
}
function checkEval(actId){
  state.evalChecked[actId]=true;
  lsSave();
  const sc=document.getElementById('content-scroll');
  const top=sc?sc.scrollTop:0;
  render();
  setTimeout(()=>{const sc2=document.getElementById('content-scroll');if(sc2)sc2.scrollTop=top;},0);
}
function chapterNav(dir){
  const chIdx=state.params.chIdx||0;
  const pageIdx=state.params.pageIdx||0;
  const ch=CHAPTERS[chIdx];
  const isLast=pageIdx===ch.pages.length-1;
  if(dir==='next'){
    if(!isLast) goTo('chapter',{chIdx,pageIdx:pageIdx+1});
    else if(chIdx<CHAPTERS.length-1) goTo('chapter',{chIdx:chIdx+1,pageIdx:0});
    else goTo('lkpd-home');
  } else {
    if(pageIdx>0) goTo('chapter',{chIdx,pageIdx:pageIdx-1});
    else if(chIdx>0) goTo('chapter',{chIdx:chIdx-1,pageIdx:CHAPTERS[chIdx-1].pages.length-1});
    else goTo('cover');
  }
}


// ── POPULATE STUDENT NAME IN TOPBAR ──
function populateTopbarName(){
  // Update topbar name chip
  const el = document.getElementById('topbar-name');
  if(el){
    try {
      const nama = localStorage.getItem('ipas_id_nama') || '';
      el.textContent = nama ? '👤 ' + nama : '';
      el.style.display = nama ? 'block' : 'none';
    } catch(e){}
  }
  // Update identity completion status on home page
  const status = document.getElementById('identity-status');
  if(status){
    try {
      const nama  = localStorage.getItem('ipas_id_nama')||'';
      const kelas = localStorage.getItem('ipas_id_kelas')||'';
      const tgl   = localStorage.getItem('ipas_id_tanggal')||'';
      const filled = [nama,kelas,tgl].filter(Boolean).length;
      if(filled===3){
        // Format tanggal lahir to readable
        let tglStr = tgl;
        try {
          const d = new Date(tgl);
          tglStr = d.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
        } catch(e){}
        status.innerHTML = `✅ <span style="color:#6fcf97">Identitas lengkap!</span> · ${nama} · Kelas ${kelas} · Lahir ${tglStr}`;
        status.style.background = 'rgba(111,207,151,.15)';
        status.style.border = '1.5px solid rgba(111,207,151,.3)';
        status.style.color = 'rgba(255,255,255,.85)';
      } else {
        const sisa = 3 - filled;
        status.innerHTML = `⚠️ Masih ada <b style="color:#f9c846">${sisa} kolom</b> yang belum diisi`;
        status.style.background = 'rgba(249,200,70,.1)';
        status.style.border = '1.5px solid rgba(249,200,70,.25)';
        status.style.color = 'rgba(255,255,255,.7)';
      }
    } catch(e){}
  }
}

// ── CHECK BEFORE PRINT ──
function checkBeforePrint(){
  const unfilled = LKPD_ACTIVITIES.filter(a=>Object.keys(state.lkpdAnswers[a.id]||{}).length===0);
  if(unfilled.length===0){
    printPage();
  } else {
    // Already shown warning in UI, just scroll to it and flash
    const btn = document.querySelector('[onclick="checkBeforePrint()"]');
    if(btn){ btn.style.transform='scale(.96)'; setTimeout(()=>btn.style.transform='',200); }
  }
}

  body += `<p style="font-weight:700;font-size:14px;color:#1a5c35;margin:12px 0 8px">B. Cocokkan Norma:</p>
    <table style="width:100%;border-collapse:collapse;font-size:14px">
      <tr style="background:#e8913d;color:#fff"><td style="padding:8px 12px;border:1.5px solid #c8e6d4;font-weight:700">Norma</td><td style="padding:8px 12px;border:1.5px solid #c8e6d4;font-weight:700">Jawaban</td><td style="padding:8px 12px;border:1.5px solid #c8e6d4;font-weight:700">Benar/Salah</td></tr>`;
  pairs.forEach((p,i)=>{
    const ok = sel[i]===p.correct;
    body += `<tr><td style="padding:8px 12px;border:1.5px solid #c8e6d4;font-weight:600">${p.norma}</td><td style="padding:8px 12px;border:1.5px solid #c8e6d4">${sel[i]||'–'}</td><td style="padding:8px 12px;border:1.5px solid #c8e6d4;color:${ok?'#2d8a52':'#c93030'};font-weight:700">${sel[i]?(ok?'✅ Benar':'❌ Salah'):'–'}</td></tr>`;
  });
  body += `</table></div>`;

  // LKPD 4 - Scenario
  body += `<div style="margin-bottom:28px;page-break-inside:avoid">
    <h3 style="background:#8b5cf6;color:#fff;padding:10px 16px;border-radius:10px;font-size:15px;margin:0 0 14px">💡 Kegiatan 4 – Interaksi Sosial Positif</h3>`;
  LKPD_ACTIVITIES[3].scenarios.forEach(s=>{
    body += `<div style="margin-bottom:14px;border:1.5px solid #c8e6d4;border-radius:10px;overflow:hidden">
      <div style="background:#8b5cf618;padding:10px 14px;border-left:4px solid #8b5cf6">
        <b style="color:#8b5cf6;font-size:14px">${s.label}:</b> <span style="font-size:14px">${s.text}</span>
      </div>
      <div style="padding:10px 14px;font-size:14px">
        <b style="color:#1a5c35">Jawaban:</b><br>
        <span style="color:#0f2d1a;line-height:1.7">${(ans['L4']||{})[s.id]||'<span style="color:#aaa">Belum dijawab</span>'}</span>
      </div>
    </div>`;
  });
  body += `</div>`;

  // LKPD 5 - Evaluation
  const evalAns = ans['L5']||{};
  const score = LKPD_ACTIVITIES[4].statements.filter(s=>evalAns[s.id]!==undefined&&evalAns[s.id]===s.ans).length;
  body += `<div style="margin-bottom:28px;page-break-inside:avoid">
    <h3 style="background:#f26b6b;color:#fff;padding:10px 16px;border-radius:10px;font-size:15px;margin:0 0 14px">🧠 Kegiatan 5 – Evaluasi & Refleksi</h3>
    <p style="font-weight:700;font-size:14px;color:#1a5c35;margin:0 0 8px">A. Setuju / Tidak Setuju: <span style="color:#2d8a52">Skor ${score}/8</span></p>
    <table style="width:100%;border-collapse:collapse;font-size:14px;margin-bottom:14px">
      <tr style="background:#f26b6b;color:#fff"><td style="padding:8px 12px;border:1.5px solid #c8e6d4;font-weight:700">No</td><td style="padding:8px 12px;border:1.5px solid #c8e6d4;font-weight:700">Pernyataan</td><td style="padding:8px 12px;border:1.5px solid #c8e6d4;font-weight:700">Jawaban</td><td style="padding:8px 12px;border:1.5px solid #c8e6d4;font-weight:700">Hasil</td></tr>`;
  LKPD_ACTIVITIES[4].statements.forEach((s,i)=>{
    const uv = evalAns[s.id];
    const ok = uv===s.ans;
    body += `<tr style="background:${i%2===0?'#f4fdf7':'#fff'}"><td style="padding:8px 12px;border:1.5px solid #c8e6d4;text-align:center;font-weight:700">${i+1}</td><td style="padding:8px 12px;border:1.5px solid #c8e6d4">${s.text}</td><td style="padding:8px 12px;border:1.5px solid #c8e6d4;text-align:center">${uv===true?'Setuju':uv===false?'Tidak':'–'}</td><td style="padding:8px 12px;border:1.5px solid #c8e6d4;text-align:center;color:${ok?'#2d8a52':'#c93030'};font-weight:700">${uv!==undefined?(ok?'✅':'❌'):'–'}</td></tr>`;
  });
  body += `</table>
    <p style="font-weight:700;font-size:14px;color:#1a5c35;margin:0 0 8px">B. Refleksi Diri:</p>`;
  LKPD_ACTIVITIES[4].reflections.forEach(r=>{
    body += `<div style="margin-bottom:12px">
      <p style="font-weight:700;font-size:14px;margin:0 0 5px;color:#1a5c35">💭 ${r.q}</p>
      <div style="border:1.5px solid #c8e6d4;border-radius:8px;padding:10px 14px;min-height:50px;font-size:14px;background:#fff8dc;color:#0f2d1a;line-height:1.7">${evalAns[r.id]||'<span style="color:#aaa">Belum diisi</span>'}</div>
    </div>`;
  });
  body += `</div>`;

  body += `<div style="text-align:center;margin-top:30px;padding-top:16px;border-top:2px solid #c8e6d4;color:#5e8872;font-size:14px">
    Bahan Ajar IPAS Kelas IV · Muhammad Fajar Wibowo · Dicetak: ${new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})}
  </div></div>`;

  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>LKPD IPAS - ${nama}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>*{box-sizing:border-box;}body{margin:0;background:#fff;}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}</style>
  </head><body>${body}</body></html>`);
  win.document.close();
  setTimeout(()=>win.print(), 800);
}
lsLoad();
render();
</script>
</body>
</html>
